services:
  - type: web
    name: auction-system
    runtime: docker
    buildCommand: mvn clean package
    startCommand: java -jar target/*.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: auction-db
          property: connectionString
      - key: DB_USERNAME
        value: your_db_username
      - key: DB_PASSWORD
        fromDatabase:
          name: auction-db
          property: connectionString.password